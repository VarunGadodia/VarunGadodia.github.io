<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Visual — Varun Gadodia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--cream:#FAF7F2;--cream2:#F2EDE4;--cream3:#E8DFD2;--terra:#C1440E;--terra-dim:#8C3410;--terra-pale:#F0D5C8;--brown:#2D1A0E;--brown2:#5C3A2A;--sand:#A8896C;--rule:rgba(45,26,14,0.12);--serif:'Playfair Display',Georgia,serif;--sans:'Plus Jakarta Sans',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--brown);color:var(--cream);font-family:var(--sans);font-weight:300;line-height:1.7;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}

nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:28px 64px}
.nav-logo{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--cream);text-decoration:none}
.nav-logo span{color:var(--terra)}
.nav-links{display:flex;gap:40px;list-style:none}
.nav-links a{font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(250,247,242,.45);text-decoration:none;transition:color .2s;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--terra);transition:width .3s}
.nav-links a:hover,.nav-links a.active{color:var(--cream)}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}
.nav-cta{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--brown);background:rgba(250,247,242,.15);padding:10px 24px;text-decoration:none;transition:background .25s}
.nav-cta:hover{background:rgba(250,247,242,.25)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{display:block;width:22px;height:1.5px;background:var(--cream)}
.mob-nav{display:none;position:fixed;inset:0;z-index:199;background:var(--brown);flex-direction:column;align-items:center;justify-content:center;gap:32px}
.mob-nav.open{display:flex}
.mob-nav a{font-family:var(--serif);font-size:32px;color:var(--cream);text-decoration:none}
.mob-nav a:hover{color:var(--terra)}
.mob-close{position:absolute;top:28px;right:40px;font-size:24px;background:none;border:none;color:rgba(250,247,242,.4);cursor:pointer}

main{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 64px 80px}
.empty-state{max-width:480px}
.empty-label{font-size:10px;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--terra);margin-bottom:32px;display:flex;align-items:center;justify-content:center;gap:16px}
.empty-label::before,.empty-label::after{content:'';width:32px;height:1px;background:var(--terra)}
.empty-title{font-family:var(--serif);font-size:clamp(40px,6vw,72px);font-weight:300;font-style:italic;line-height:1.05;letter-spacing:-.02em;color:var(--cream);margin-bottom:24px}
.empty-sub{font-size:14px;font-weight:300;color:rgba(250,247,242,.4);line-height:1.85}

footer{padding:24px 64px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(250,247,242,.08)}
.footer-l{font-size:12px;color:rgba(250,247,242,.3)}
.footer-r a{font-size:12px;color:rgba(250,247,242,.35);text-decoration:none}
.footer-r a:hover{color:var(--cream)}

@media(max-width:1100px){nav{padding-left:40px;padding-right:40px}.nav-links{display:none}.hamburger{display:flex}footer{padding:20px 40px}}
@media(max-width:640px){nav{padding-left:20px;padding-right:20px}main{padding:100px 20px 60px}footer{flex-direction:column;gap:8px;text-align:center;padding:20px}}
</style>
</head>
<body>

<div class="mob-nav" id="mobNav">
  <button class="mob-close" onclick="closeMob()">✕</button>
  <a href="index.html" onclick="closeMob()">Home</a>
  <a href="journey.html" onclick="closeMob()">Journey</a>
  <a href="projects.html" onclick="closeMob()">Projects</a>
  <a href="visual.html" onclick="closeMob()">Visual</a>
  <a href="writing.html" onclick="closeMob()">Writing</a>
</div>

<nav>
  <a href="index.html" class="nav-logo">V<span>.</span></a>
  <ul class="nav-links">
    <li><a href="journey.html">Journey</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="visual.html" class="active">Visual</a></li>
    <li><a href="writing.html">Writing</a></li>
  </ul>
  <a href="https://www.instagram.com/varuns.drafts/" target="_blank" class="nav-cta">Instagram</a>
  <button class="hamburger" onclick="openMob()"><span></span><span></span><span></span></button>
</nav>

<main>
  <div class="empty-state">
    <div class="empty-label">Visual</div>
    <h1 class="empty-title">Something is<br>being built here.</h1>
    <p class="empty-sub">Photography, graphic design, and visual work — coming soon. In the meantime, find some of it on Instagram.</p>
  </div>
</main>

<footer>
  <span class="footer-l">© 2025 Varun Gadodia</span>
  <div class="footer-r"><a href="index.html">← Back to Home</a></div>
</footer>

<script>
function openMob(){document.getElementById('mobNav').classList.add('open')}
function closeMob(){document.getElementById('mobNav').classList.remove('open')}
</script>
</body>
</html>
